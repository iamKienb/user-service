version: v2
inputs:
  - directory: contract/proto

plugins:
  - remote: buf.build/protocolbuffers/go
    out: contract/protogen
    opt: paths=source_relative

  - remote: buf.build/connectrpc/go
    out: contract/protogen
    opt: paths=source_relative

  - local: protoc-gen-validate  # ← đổi thành local
    out: contract/protogen
    opt:
      - paths=source_relative
      - lang=go