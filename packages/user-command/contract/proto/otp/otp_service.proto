syntax = "proto3";
package otp.v1;

import "otp/otp.proto";

option go_package = "shopify-user-command-module/contract/protogen/otp";

// OTPCommandService provides commands for user management.
service OTPCommandService {
  //  Verify otp.
  rpc Verify(VerifyRequest) returns (VerifyResponse);
  
  // Resend otp.
  rpc Resend(ResendRequest) returns (ResendResponse);
}

// UserQueryService provides queries for service call.
service OTPQueryService {}