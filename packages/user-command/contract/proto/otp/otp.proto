syntax = "proto3";

package otp.v1;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "shopify-user-command-module/contract/protogen/otp";

message VerifyRequest {
  string session_token = 1 [(validate.rules).string.min_len = 1];
  
  string otp = 2 [(validate.rules).string = {
    min_len: 6,
    max_len: 6,
    pattern: "^[0-9]+$"
  }];
}

message VerifyResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

message ResendRequest {
  string session_token = 1 [(validate.rules).string.min_len = 1];
}

message ResendResponse {
  google.protobuf.Timestamp expires_at = 1;
}
